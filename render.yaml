services:
  - type: web
    name: canvas-read-mcp
    runtime: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NVIDIA_API_KEY
        sync: false
    
    dockerContext: .
    dockerfilePath: ./Dockerfile

    # Render will now auto-detect port 10000
